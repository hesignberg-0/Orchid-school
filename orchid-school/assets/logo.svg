<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 170" font-family="'DM Sans',Arial,sans-serif">
  <!-- Emblem: broken navy ring with 3 gold dots + orchid petal top -->
  <g>
    <!-- petal -->
    <path d="M75 8 C90 30 90 42 75 54 C60 42 60 30 75 8 Z" fill="#0B47A6"/>
    <!-- ring arcs -->
    <g fill="none" stroke="#0B47A6" stroke-width="20" stroke-linecap="round">
      <path d="M52 40 A56 56 0 0 0 22 92"/>
      <path d="M98 40 A56 56 0 0 1 128 92"/>
      <path d="M34 128 A56 56 0 0 0 116 128"/>
    </g>
    <!-- gold dots -->
    <circle cx="44" cy="56" r="15" fill="#EDB04C"/>
    <circle cx="106" cy="56" r="15" fill="#EDB04C"/>
    <circle cx="75" cy="138" r="15" fill="#EDB04C"/>
  </g>
  <!-- Wordmark -->
  <text x="158" y="100" font-size="62" font-weight="800" fill="#EDB04C" letter-spacing="2">ORCHID</text>
  <text x="160" y="135" font-size="22" font-weight="700" fill="#0B47A6" letter-spacing="3">ENGLISH SECONDARY SCHOOL</text>
</svg>
